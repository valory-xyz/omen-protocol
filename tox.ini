; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
; Runtime deps not in pyproject but referenced by third-party package YAMLs.
; `aea-helpers check-dependencies` does string-strict matching, so the form
; here must match the YAML exactly.
extra_deps =
    protobuf<6,>=5
    werkzeug>=3.1,<4
    attrs>=25,<26
    py-ecc<10,>=8
    urllib3<3,>=1.21.1
    eth-abi==5.2.0

[pytest]
tomte_defaults = true
; anchorpy 0.20.2 (pulled transitively via open-aea-ledger-solana since
; open-autonomy 0.21.20) ships a pytest plugin with a broken import
; (`from pytest_xprocess import getrootdir`) that crashes pytest
; collection. Disable its pytest11 entry point.
addopts = -p no:pytest_anchorpy
asyncio_mode = strict

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore


[Authorized Packages]
; open-autonomy wheel metadata reports "Other/Proprietary"; actual license is Apache-2.0.
open-autonomy: ==0.21.22
; anchorpy / based58 / jsonalias: transitive deps via open-aea-ledger-solana
; (added by open-autonomy 0.21.20). All three ship under MIT per their
; GitHub repos but expose no PyPI License field, so PARANOID liccheck
; reports them UNKNOWN.
anchorpy: 0.20.2
based58: 0.1.1
jsonalias: 0.1.1
; httpx: pulled in via solana << anchorpy.
httpx: >=1.0.0-dev,<2
; setuptools — license metadata reports UNKNOWN, actual MIT.
setuptools: >=78.0.0,<79
; blake3 license classifier is "CC0-1.0 OR Apache-2.0".
blake3: 1.0.8
; dnspython is ISC-licensed; ISC isn't in PARANOID's default allowlist.
dnspython: >=2,<3
